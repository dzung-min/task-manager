name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: mysql:lts
        env:
          MYSQL_DATABASE: taskmanager_test
          MYSQL_USER: dzung
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test -Dtest="**/*Tests" -DfailIfNoTests=false

      - name: Run integration tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/taskmanager_test
          SPRING_DATASOURCE_USERNAME: dzung
          SPRING_DATASOURCE_PASSWORD: password
        run: ./mvnw test -Dtest="**/*IntegrationTests" -DfailIfNoTests=false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
